<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#3f0204",
                        "secondary-container": "#eae0e0",
                        "on-primary": "#ffffff",
                        "on-background": "#1a1c1c",
                        "secondary": "#635d5d",
                        "surface-bright": "#faf9f8",
                        "surface-container": "#eeeeed",
                        "surface-container-low": "#f4f3f2",
                        "outline-variant": "#dbc1be",
                        "surface-container-highest": "#e3e2e1",
                        "on-tertiary-fixed": "#2a1617",
                        "primary-container": "#f28b82",
                        "primary-fixed": "#ffdad6",
                        "outline": "#887270",
                        "on-error": "#ffffff",
                        "inverse-surface": "#2f3130",
                        "surface-container-lowest": "#ffffff",
                        "surface-tint": "#98443e",
                        "surface-container-high": "#e9e8e7",
                        "on-tertiary-container": "#4f3737",
                        "primary": "#98443e",
                        "on-primary-fixed-variant": "#7a2e29",
                        "surface-variant": "#e3e2e1",
                        "secondary-fixed-dim": "#cdc4c4",
                        "on-primary-container": "#6d2420",
                        "on-surface": "#1a1c1c",
                        "primary-fixed-dim": "#ffb3ac",
                        "tertiary-fixed-dim": "#e1bebe",
                        "inverse-primary": "#ffb3ac",
                        "on-secondary-fixed": "#1f1b1b",
                        "tertiary": "#735858",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-secondary-fixed-variant": "#4b4546",
                        "inverse-on-surface": "#f1f0ef",
                        "secondary-fixed": "#eae0e0",
                        "tertiary-container": "#c1a0a0",
                        "surface": "#faf9f8",
                        "surface-dim": "#dadad9",
                        "on-surface-variant": "#554240",
                        "on-secondary-container": "#696363",
                        "tertiary-fixed": "#ffdada",
                        "on-tertiary-fixed-variant": "#594041",
                        "background": "#faf9f8",
                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "64px",
                        "margin-mobile": "20px",
                        "lg": "40px",
                        "xs": "4px",
                        "md": "24px",
                        "base": "8px",
                        "sm": "12px",
                        "gutter": "16px",
                        "container-margin": "24px"
                    },
                    "fontFamily": {
                        "label-md": ["Plus Jakarta Sans"],
                        "headline-md": ["Lexend"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline-lg": ["Lexend"],
                        "display-xl": ["Lexend"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                        "headline-md": ["22px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "headline-lg": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                        "display-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .progress-spring {
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .timer-ring {
            transition: stroke-dashoffset 1s linear;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 left-0 w-full z-50 bg-surface">
<div class="flex justify-between items-center px-container-margin py-base w-full max-w-7xl mx-auto">
<div class="flex items-center gap-sm">
<button class="active:scale-95 transition-transform duration-150 p-xs">
<span class="material-symbols-outlined text-primary">close</span>
</button>
<span class="text-headline-md font-headline-md font-bold text-primary">GoalQuiz</span>
</div>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-headline-md text-primary">12</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-xl pb-xl px-container-margin max-w-3xl mx-auto flex flex-col min-h-screen">
<!-- Progress Indicator -->
<div class="mt-md mb-lg">
<div class="flex justify-between items-end mb-xs">
<span class="text-label-md font-label-md text-secondary">Question 8 of 10</span>
<span class="text-label-sm font-label-sm text-on-surface-variant">80% Complete</span>
</div>
<div class="w-full h-sm bg-secondary-container rounded-full overflow-hidden">
<div class="h-full bg-primary progress-spring" style="width: 80%;"></div>
</div>
</div>
<!-- Quiz Question Header Section -->
<section class="flex flex-col items-center text-center mb-xl">
<!-- Circular Timer -->
<div class="relative w-24 h-24 mb-md flex items-center justify-center">
<svg class="absolute inset-0 transform -rotate-90 w-full h-full">
<circle class="text-secondary-container" cx="48" cy="48" fill="transparent" r="40" stroke="currentColor" stroke-width="8"></circle>
<circle class="text-primary timer-ring" cx="48" cy="48" fill="transparent" r="40" stroke="currentColor" stroke-dasharray="251.2" stroke-dashoffset="62.8" stroke-width="8"></circle>
</svg>
<span class="text-headline-md font-headline-md text-primary">15s</span>
</div>
<h1 class="text-headline-lg font-headline-lg text-on-surface mb-sm">Who won the 2022 FIFA World Cup?</h1>
<div class="flex gap-xs items-center justify-center">
<span class="bg-secondary-container text-on-secondary-container px-sm py-xs rounded-full text-label-sm font-label-sm">World Cup</span>
<span class="bg-surface-container-highest text-on-surface-variant px-sm py-xs rounded-full text-label-sm font-label-sm">+500 PTS</span>
</div>
</section>
<!-- Quiz Options Bento-style Grid -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-gutter flex-grow">
<!-- Option 1: Argentina -->
<button class="group relative flex items-center p-md bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm hover:border-primary hover:shadow-md transition-all active:scale-95 text-left h-32 overflow-hidden">
<div class="flex flex-col flex-grow z-10">
<span class="text-label-sm font-label-sm text-secondary mb-xs">Option A</span>
<span class="text-headline-md font-headline-md text-on-surface">Argentina</span>
</div>
<div class="opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-[64px] text-primary" style="font-variation-settings: 'FILL' 1;">emoji_events</span>
</div>
</button>
<!-- Option 2: France -->
<button class="group relative flex items-center p-md bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm hover:border-primary hover:shadow-md transition-all active:scale-95 text-left h-32 overflow-hidden">
<div class="flex flex-col flex-grow z-10">
<span class="text-label-sm font-label-sm text-secondary mb-xs">Option B</span>
<span class="text-headline-md font-headline-md text-on-surface">France</span>
</div>
<div class="opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-[64px] text-primary" style="font-variation-settings: 'FILL' 1;">sports_soccer</span>
</div>
</button>
<!-- Option 3: Brazil -->
<button class="group relative flex items-center p-md bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm hover:border-primary hover:shadow-md transition-all active:scale-95 text-left h-32 overflow-hidden">
<div class="flex flex-col flex-grow z-10">
<span class="text-label-sm font-label-sm text-secondary mb-xs">Option C</span>
<span class="text-headline-md font-headline-md text-on-surface">Brazil</span>
</div>
<div class="opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-[64px] text-primary" style="font-variation-settings: 'FILL' 1;">public</span>
</div>
</button>
<!-- Option 4: Croatia -->
<button class="group relative flex items-center p-md bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm hover:border-primary hover:shadow-md transition-all active:scale-95 text-left h-32 overflow-hidden">
<div class="flex flex-col flex-grow z-10">
<span class="text-label-sm font-label-sm text-secondary mb-xs">Option D</span>
<span class="text-headline-md font-headline-md text-on-surface">Croatia</span>
</div>
<div class="opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-[64px] text-primary" style="font-variation-settings: 'FILL' 1;">flag</span>
</div>
</button>
</section>
<!-- Visual Anchor -->
<div class="mt-lg rounded-xl overflow-hidden shadow-sm h-40 relative">
<img alt="World Cup Trophy" class="w-full h-full object-cover" data-alt="A professional high-angle shot of a majestic gold football trophy resting on a lush green stadium pitch under bright, cinematic floodlights. The atmosphere is high-energy and triumphant, reflecting a premium sports brand aesthetic. The lighting is crisp and modern, featuring soft blue shadows and vibrant highlights that align with a playful yet clean athletic design system. The background shows a blurred, vast stadium seating area in a soft evening light." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCZSSBhSjUim59KKIgfus-T5JzGk9z7x-hwc_Md5B6mfYOSbenZXQVVvZ_Ehpaaljf2QC8UiBuDjXZIK4IpPQRgwjJcOZnjiyt7VvpsxRisjKex1h1bSNbcmKadIDp8x3yjT0XHBncVMj1mB-ZdlDkOn4MOclfJ05u3c1Lh1j1xreEbN-MOQHhzXxJRTqtk9DgmIzZZ99qN7ZmvaPKRKAv3YM9-_0XhRjt-6ETG8aWplnll0oAQlh4qGaFtwbUOUcJg2cYTEIkUHQI"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
<div class="absolute bottom-sm left-md">
<p class="text-white font-label-md">Select the correct answer to maintain your streak!</p>
</div>
</div>
</main>
<!-- Bottom Action Space -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-low px-container-margin py-sm md:hidden border-t border-outline-variant">
<div class="flex items-center justify-center gap-xs text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">lightbulb</span>
<span class="text-label-sm font-label-sm">Hint: The final was against France.</span>
</div>
</div>
</body></html>
